name: Update Playoff Scores

on:
  schedule:
    # Every 15 min during NBA playoff game windows (EDT afternoons/evenings → UTC)
    # Weekdays + weekends, April through June
    - cron: '*/15 16-23 * 4-6 *'   # noon–7pm EDT (afternoon games)
    - cron: '*/15 0-6 * 4-6 *'     # 8pm–2am EDT (evening/late games)
  workflow_dispatch: {}  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync picks from Google Sheet
        run: python scripts/sync_picks.py || true

      - name: Update scores
        run: python scripts/update_scores.py --year 2026

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/stats.json data/picks.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json data/picks.json
          git commit -m "Update scores + picks $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
