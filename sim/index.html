<script src="allyears.js"></script>
<script>
// ====================================================================
// NBA Fantasy Optimizer — adapted from march-madness-fantasy
// Scoring: round_score = avg(top-4 game pts) * (1 + seed/10 if year >= 2025)
// Bracket: 16 teams (8 per conference); R1 → CSF → CF → Finals (best-of-7)
// ====================================================================

const BUDGET = 115.6;
const FLOOR = BUDGET / 16;
const PAYOUTS = {1:675, 2:337.50, 3:175.50, 4:94.50, 5:67.50};  // sample 27×$50 pot
const SCREEN_N = 800, CONFIRM_N = 25000, CONFIRM_BATCH = 500;
const MULTIPLIER_START_YEAR = 2025;

// Empirical NBA series-length distribution per round (4-7 games)
// Approx historical: most series 5-6 games, some sweeps, some go 7
const SERIES_LEN_DIST = {
  4: 0.15, 5: 0.30, 6: 0.30, 7: 0.25
};

// === Year state ===
let currentYear = '2026';
let CUR = ALL_YEARS_DATA[currentYear];

(function initYearSelector() {
  const sel = document.getElementById('yearSelect');
  for (const y of Object.keys(ALL_YEARS_DATA).sort((a,b)=>b-a)) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if (y === currentYear) opt.selected = true;
    sel.appendChild(opt);
  }
})();

function multFor(seed) {
  return parseInt(currentYear, 10) >= MULTIPLIER_START_YEAR ? (1 + seed / 10) : 1;
}

function effCost(ppg) { return Math.max(ppg, FLOOR); }

// === RNG ===
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function gauss(rng){let u,v,s;do{u=rng()*2-1;v=rng()*2-1;s=u*u+v*v}while(s>=1||s===0);return u*Math.sqrt(-2*Math.log(s)/s);}

// Bradley-Terry win probability based on seed (lower seed = better)
function wp(seedA, seedB) { return seedA === seedB ? 0.5 : 1 / (1 + Math.pow(10, (seedA - seedB) * 0.08)); }

// Sample series length (4-7) from empirical distribution
function sampleSeriesLen(rng) {
  const r = rng();
  let cum = 0;
  for (const [len, p] of Object.entries(SERIES_LEN_DIST)) {
    cum += p;
    if (r < cum) return parseInt(len);
  }
  return 7;
}

// === Bracket simulator ===
// Returns { team_name -> { R1, CSF, CF, Finals } } each = games_played in that round (0 if didn't play)
function simBracket(rng) {
  // Group bracket teams: split by alternating order so we have rough conferences
  // For real NBA brackets we'd want explicit conference labels; without those
  // we just split into 2 halves of 8, pair internally as 1v8/4v5/3v6/2v7.
  const teams = CUR.bracket.slice();
  // Group by seed, then split each seed's teams into A/B halves
  const bySeed = {};
  for (const t of teams) (bySeed[t.seed] ||= []).push(t);
  const confA = [], confB = [];
  for (let s = 1; s <= 8; s++) {
    const arr = (bySeed[s] || []).slice();
    if (arr.length >= 1) confA.push(arr[0]);
    if (arr.length >= 2) confB.push(arr[1]);
  }
  const games = {};
  function init(t) { games[t.team_name] = {R1: 0, CSF: 0, CF: 0, Finals: 0}; }
  confA.forEach(init); confB.forEach(init);

  function playSeries(t1, t2, round) {
    if (!t1 || !t2) return t1 || t2;
    const len = sampleSeriesLen(rng);
    games[t1.team_name][round] = len;
    games[t2.team_name][round] = len;
    return rng() < wp(t1.seed, t2.seed) ? t1 : t2;
  }

  function runConf(conf) {
    const bySeedC = {};
    conf.forEach(t => bySeedC[t.seed] = t);
    // R1
    const r1 = [
      playSeries(bySeedC[1], bySeedC[8], 'R1'),
      playSeries(bySeedC[4], bySeedC[5], 'R1'),
      playSeries(bySeedC[3], bySeedC[6], 'R1'),
      playSeries(bySeedC[2], bySeedC[7], 'R1'),
    ];
    // CSF
    const csf = [
      playSeries(r1[0], r1[1], 'CSF'),
      playSeries(r1[2], r1[3], 'CSF'),
    ];
    // CF
    const cfWinner = playSeries(csf[0], csf[1], 'CF');
    return cfWinner;
  }

  const champA = runConf(confA);
  const champB = runConf(confB);
  if (champA && champB) playSeries(champA, champB, 'Finals');
  return games;
}

// Score a team (8 picks) for one simulation
function simRoster(picks, rng, games) {
  let total = 0;
  for (const pick of picks) {
    const teamGames = games[pick.team];
    if (!teamGames) continue;
    const ppg = pick.ppg;
    const sd = ppg * 0.4;  // 40% relative variance per game
    const m = multFor(pick.seed);
    for (const round of ['R1','CSF','CF','Finals']) {
      const ng = teamGames[round] || 0;
      if (!ng) continue;
      const samples = [];
      for (let i = 0; i < ng; i++) samples.push(Math.max(0, ppg + gauss(rng) * sd));
      samples.sort((a,b)=>b-a);
      const top = samples.slice(0, 4);
      const avg = top.reduce((a,b)=>a+b,0) / top.length;
      total += avg * m;
    }
  }
  return total;
}

// Run N simulations, return EV vs payouts and average roster pts
function simBatch(picks, n, rngSeed) {
  const rng = mulberry32(rngSeed);
  let totalPts = 0, totalEV = 0;
  const opponents = (CUR.opponents || []).filter(o => o.players && o.players.length === 8);
  for (let i = 0; i < n; i++) {
    const games = simBracket(rng);
    const my = simRoster(picks, rng, games);
    totalPts += my;
    if (opponents.length === 0) {
      totalEV += PAYOUTS[1];  // No opponents = always 1st (degenerate)
      continue;
    }
    const all = [my];
    for (const opp of opponents) all.push(simRoster(opp.players, rng, games));
    all.sort((a,b)=>b-a);
    const myRank = all.indexOf(my) + 1;
    totalEV += PAYOUTS[myRank] || 0;
  }
  return { ev: totalEV / n, pts: totalPts / n };
}

// === Roster representation ===
// indices[seed] = index into CUR.pool_by_seed[seed+1]
function resolveTeam(indices) {
  const picks = [];
  for (let s = 1; s <= 8; s++) {
    const ps = CUR.pool_by_seed[s] || CUR.pool_by_seed[String(s)] || [];
    const idx = indices[s-1] || 0;
    const p = ps[idx] || ps[0];
    if (p) picks.push({...p, seed: s});
  }
  return picks;
}

function rosterCost(picks) {
  return picks.reduce((sum, p) => sum + effCost(p.ppg), 0);
}

function rosterValid(picks) { return rosterCost(picks) <= BUDGET + 0.01; }

function getLineupSnapshot(indices) {
  return resolveTeam(indices).map(p => ({seed: p.seed, name: p.name, team: p.team, ppg: p.ppg, slug: p.slug}));
}

// Reference: highest-PPG roster within budget (cheapest greedy fallback)
function computeRefLineup() {
  // Greedy: pick highest PPG at each seed; if over budget, swap down to lowest-PPG cheapest at most-expensive seed until fits
  const indices = new Array(8).fill(0);
  let picks = resolveTeam(indices);
  let safety = 50;
  while (!rosterValid(picks) && safety-- > 0) {
    // Find seed with highest cost contribution; bump its index down (next-best)
    let worstSeed = 0, worstIncrement = -Infinity;
    for (let s = 1; s <= 8; s++) {
      const ps = CUR.pool_by_seed[s] || CUR.pool_by_seed[String(s)] || [];
      const cur = ps[indices[s-1]];
      const next = ps[indices[s-1] + 1];
      if (!next) continue;
      const saving = effCost(cur.ppg) - effCost(next.ppg);
      const ppgLoss = cur.ppg - next.ppg;
      const ratio = saving > 0 ? ppgLoss / saving : 1e9;
      if (-ratio > worstIncrement) { worstIncrement = -ratio; worstSeed = s; }
    }
    if (worstSeed === 0) break;
    indices[worstSeed - 1]++;
    picks = resolveTeam(indices);
  }
  return indices;
}

// === STATE ===
let bestIndices = computeRefLineup();
let refIndices = computeRefLineup();
let bestEV = null, bestPts = null, refEV = null;
let bestEVHistory = [];
let totalTested = 0, totalAdopted = 0, totalFailed = 0;
let running = false;
let candHistory = [];

function getSaveKey() { return 'nba_optimizer_state_' + currentYear; }

function saveState() {
  const state = {
    bestSlugs: resolveTeam(bestIndices).map(p => p.slug),
    bestEV, bestPts, refEV, bestEVHistory,
  };
  try { localStorage.setItem(getSaveKey(), JSON.stringify(state)); } catch(e) {}
  document.getElementById('saveStatus').textContent = currentYear + ' best saved ' + new Date().toLocaleTimeString();
}

function slugsToIndices(slugs) {
  const idx = [];
  for (let s = 1; s <= 8; s++) {
    const ps = CUR.pool_by_seed[s] || CUR.pool_by_seed[String(s)] || [];
    const i = ps.findIndex(p => p.slug === slugs[s-1]);
    idx.push(i >= 0 ? i : 0);
  }
  return idx;
}

function loadState() {
  try {
    const raw = localStorage.getItem(getSaveKey());
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.bestSlugs) bestIndices = slugsToIndices(state.bestSlugs);
    if (state.bestEV != null) bestEV = state.bestEV;
    if (state.bestPts != null) bestPts = state.bestPts;
    if (state.refEV != null) refEV = state.refEV;
    if (state.bestEVHistory) bestEVHistory = state.bestEVHistory;
    return true;
  } catch(e) { return false; }
}

function clearSaved() {
  if (!confirm('Clear saved state for ' + currentYear + '?')) return;
  localStorage.removeItem(getSaveKey());
  location.reload();
}

function exportResults() {
  const data = {
    exportTime: new Date().toISOString(),
    year: currentYear, bestEV,
    bestLineup: getLineupSnapshot(bestIndices),
    history: bestEVHistory,
    stats: {totalTested, totalAdopted, totalFailed},
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `optimizer_${currentYear}_${Date.now()}.json`;
  a.click();
}

function switchYear(year) {
  if (running) { alert('Pause optimizer first'); document.getElementById('yearSelect').value = currentYear; return; }
  currentYear = year;
  CUR = ALL_YEARS_DATA[year];
  bestIndices = computeRefLineup();
  refIndices = computeRefLineup();
  bestEV = bestPts = refEV = null;
  bestEVHistory = []; candHistory = [];
  totalTested = totalAdopted = totalFailed = 0;
  loadState();
  renderBestTeam();
  updateCounters();
  drawHistoryChart();
  drawCandChart();
  document.getElementById('logBox').innerHTML = '';
  log('Switched to ' + year + ' · ' + CUR.opponents.length + ' opponents · '
      + Object.values(CUR.pool_by_seed).reduce((a,b)=>a+b.length,0) + ' players', 'log-test');
}

// === UI ===
function log(msg, cls='') {
  const box = document.getElementById('logBox'), el = document.createElement('div');
  el.className = 'log-entry ' + (cls || '');
  el.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  box.prepend(el);
  while (box.children.length > 200) box.removeChild(box.lastChild);
}

function updateCounters() {
  document.getElementById('totalTested').textContent = totalTested;
  document.getElementById('totalAdopted').textContent = totalAdopted;
  document.getElementById('totalFailed').textContent = totalFailed;
}

function renderBestTeam() {
  document.getElementById('bestStats').innerHTML =
    `<div class="stat"><div class="sv o">${bestEV != null ? '$'+bestEV.toFixed(1) : '—'}</div><div class="sl">EV (${currentYear})</div></div>`
    + (bestPts != null ? `<div class="stat"><div class="sv g">${bestPts.toFixed(0)}</div><div class="sl">Avg Pts</div></div>` : '')
    + `<div class="stat"><div class="sv b">${rosterCost(resolveTeam(bestIndices)).toFixed(1)}</div><div class="sl">Cost / ${BUDGET}</div></div>`;

  const team = resolveTeam(bestIndices);
  const refTeam = resolveTeam(refIndices);

  let tbl = '<table class="compare-table"><thead><tr>';
  tbl += `<th colspan="4" class="section-head ev-head">Best EV Lineup <span class="badge best">OPTIMIZING</span></th>`;
  const refEvStr = refEV != null ? ' — EV: $' + refEV.toFixed(1) : '';
  tbl += `<th class="section-divider"></th><th colspan="4" class="section-head ref-head">Max-PPG Reference${refEvStr}</th>`;
  tbl += '</tr><tr><th>Sd</th><th>Player</th><th>Team</th><th>PPG</th>';
  tbl += '<th class="section-divider"></th><th>Player</th><th>Team</th><th>PPG</th>';
  tbl += '</tr></thead><tbody>';

  let evCost = 0, refCost = 0;
  const diffs = [];
  for (let i = 0; i < 8; i++) {
    const s = i + 1, p = team[i], rp = refTeam[i];
    if (!p || !rp) continue;
    const playerDiff = p.slug !== rp.slug;
    const evName = playerDiff ? `<span class="diff-name">${p.name}</span>` : p.name;
    const refName = playerDiff ? `<span class="diff-name">${rp.name}</span>` : rp.name;
    const m = multFor(s).toFixed(1) + '×';
    evCost += effCost(p.ppg); refCost += effCost(rp.ppg);
    tbl += `<tr><td>${s} <span style="color:#64748b;font-size:.8em">${m}</span></td><td>${evName}</td><td>${p.team}</td><td>${p.ppg}</td><td class="section-divider"></td><td>${refName}</td><td>${rp.team}</td><td>${rp.ppg}</td></tr>`;
    if (playerDiff) diffs.push({seed: s, ev: p.name, ref: rp.name});
  }
  const evCostClass = evCost > BUDGET ? 'over-budget' : '';
  const refCostClass = refCost > BUDGET ? 'over-budget' : '';
  tbl += `<tr style="border-top:2px solid #1e3a5f;font-weight:900;color:#c8102e"><td></td><td>COST</td><td></td><td class="${evCostClass}">${evCost.toFixed(2)} / ${BUDGET}</td><td class="section-divider"></td><td>COST</td><td></td><td class="${refCostClass}">${refCost.toFixed(2)} / ${BUDGET}</td></tr>`;
  tbl += '</tbody></table>';
  document.getElementById('compareTableWrap').innerHTML = tbl;

  if (diffs.length === 0) {
    document.getElementById('diffSummary').innerHTML = 'Lineups <span style="color:#22c55e;font-weight:700">identical</span>.';
  } else {
    const ds = diffs.map(d => `<span style="color:#eab308">Sd${d.seed}:</span> ${d.ref} <span style="color:#64748b">→</span> ${d.ev}`);
    document.getElementById('diffSummary').innerHTML = `<span style="color:#eab308;font-weight:700">${diffs.length} swap${diffs.length>1?'s':''}:</span> ${ds.join(' | ')}`;
  }
}

// === Charts ===
function drawCandChart() {
  const c = document.getElementById('candChart'), ctx = c.getContext('2d'), W = c.width, H = c.height;
  const pad = {top: 18, right: 15, bottom: 22, left: 48}, cw = W-pad.left-pad.right, ch = H-pad.top-pad.bottom;
  ctx.clearRect(0, 0, W, H);
  if (candHistory.length < 2) return;
  const all = [...candHistory, bestEV || 0];
  let yMin = Math.min(...all)-20, yMax = Math.max(...all)+20;
  yMin = Math.max(0, yMin);
  const xS = cw / (candHistory.length-1), yS = ch / (yMax-yMin);
  ctx.strokeStyle = '#1e3a5f'; ctx.lineWidth = 1;
  const yStep = Math.ceil((yMax-yMin)/4/10) * 10 || 10;
  ctx.font = '9px monospace'; ctx.fillStyle = '#64748b'; ctx.textAlign = 'right';
  for (let y = Math.ceil(yMin/yStep)*yStep; y <= yMax; y += yStep) {
    const py = pad.top+ch-(y-yMin)*yS;
    ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(W-pad.right, py); ctx.stroke();
    ctx.fillText('$'+y, pad.left-4, py+3);
  }
  if (bestEV > 0) {
    const baseY = pad.top+ch-(bestEV-yMin)*yS;
    ctx.strokeStyle = '#c8102e88'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.moveTo(pad.left, baseY); ctx.lineTo(W-pad.right, baseY); ctx.stroke();
    ctx.setLineDash([]);
  }
  const last = candHistory[candHistory.length-1], beating = last > (bestEV || 0);
  ctx.strokeStyle = beating ? '#22c55e' : '#3b82f6'; ctx.lineWidth = 2; ctx.beginPath();
  for (let i = 0; i < candHistory.length; i++) {
    const px = pad.left+i*xS, py = pad.top+ch-(candHistory[i]-yMin)*yS;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.stroke();
}

function drawHistoryChart() {
  const c = document.getElementById('historyChart'), ctx = c.getContext('2d'), W = c.width, H = c.height;
  const pad = {top: 15, right: 15, bottom: 20, left: 48}, cw = W-pad.left-pad.right, ch = H-pad.top-pad.bottom;
  ctx.clearRect(0, 0, W, H);
  if (bestEVHistory.length < 1) return;
  const vals = bestEVHistory.map(h => h.ev);
  let yMin = Math.min(...vals)-10, yMax = Math.max(...vals)+10;
  yMin = Math.max(0, yMin);
  const xS = bestEVHistory.length > 1 ? cw / (bestEVHistory.length-1) : cw;
  const yS = ch / (yMax-yMin);
  ctx.strokeStyle = '#1e3a5f'; ctx.lineWidth = 1;
  const yStep = Math.ceil((yMax-yMin)/3/5) * 5 || 5;
  ctx.font = '9px monospace'; ctx.fillStyle = '#64748b'; ctx.textAlign = 'right';
  for (let y = Math.ceil(yMin/yStep)*yStep; y <= yMax; y += yStep) {
    const py = pad.top+ch-(y-yMin)*yS;
    ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(W-pad.right, py); ctx.stroke();
    ctx.fillText('$'+y, pad.left-4, py+3);
  }
  ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2; ctx.beginPath();
  for (let i = 0; i < bestEVHistory.length; i++) {
    const px = pad.left+i*xS, py = pad.top+ch-(bestEVHistory[i].ev-yMin)*yS;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.stroke();
  for (let i = 0; i < bestEVHistory.length; i++) {
    const px = pad.left+i*xS, py = pad.top+ch-(bestEVHistory[i].ev-yMin)*yS;
    ctx.fillStyle = i === bestEVHistory.length-1 ? '#22c55e' : '#1e7a3e';
    ctx.beginPath(); ctx.arc(px, py, i === bestEVHistory.length-1 ? 5 : 3, 0, Math.PI*2); ctx.fill();
  }
}

// History chart hover tooltip
const histCanvas = document.getElementById('historyChart'), histTooltip = document.getElementById('histTooltip');
histCanvas.addEventListener('mousemove', e => {
  if (bestEVHistory.length < 1) { histTooltip.style.display = 'none'; return; }
  const rect = histCanvas.getBoundingClientRect();
  const sX = histCanvas.width / rect.width, sY = histCanvas.height / rect.height;
  const mx = (e.clientX - rect.left) * sX;
  const pad = {top:15, left:48, bottom:20}, cw = histCanvas.width-pad.left-15, ch = histCanvas.height-pad.top-pad.bottom;
  const xS = bestEVHistory.length > 1 ? cw / (bestEVHistory.length-1) : cw;
  let closest = -1, cd = Infinity;
  for (let i = 0; i < bestEVHistory.length; i++) {
    const px = pad.left + i*xS;
    const d = Math.abs(mx - px);
    if (d < cd) { cd = d; closest = i; }
  }
  if (closest < 0 || cd > 30*sX) { histTooltip.style.display = 'none'; return; }
  const en = bestEVHistory[closest];
  let h = `<div class="tt-ev">$${en.ev.toFixed(2)}</div>`;
  h += `<div class="tt-time">${new Date(en.time).toLocaleString()} · #${closest+1}</div>`;
  if (en.lineup) for (const p of en.lineup) {
    h += `<div class="tt-row"><span class="tt-seed">${p.seed}</span><span class="tt-name">${p.name}</span><span class="tt-ppg">${p.ppg}</span></div>`;
  }
  if (en.swapDesc) h += `<div class="tt-swap">${en.swapDesc}</div>`;
  histTooltip.innerHTML = h;
  histTooltip.style.display = 'block';
  const ttL = Math.min(e.clientX-rect.left+10, rect.width-260);
  const ttT = Math.max(e.clientY-rect.top-200, 0);
  histTooltip.style.left = ttL+'px'; histTooltip.style.top = ttT+'px';
});
histCanvas.addEventListener('mouseleave', () => { histTooltip.style.display = 'none'; });

// === Optimizer ===
function genCandidate() {
  const trial = [...bestIndices];
  const t = Math.random();
  let nSwaps = t < 0.5 ? 1 : t < 0.8 ? 2 : 3;
  const seeds = [];
  while (seeds.length < nSwaps) {
    const s = Math.floor(Math.random() * 8);
    if (!seeds.includes(s)) seeds.push(s);
  }
  for (const s of seeds) {
    const ps = CUR.pool_by_seed[s+1] || CUR.pool_by_seed[String(s+1)] || [];
    if (ps.length <= 1) continue;
    // PPG-weighted random pick (excluding current)
    const weights = ps.map((p, i) => i === trial[s] ? 0 : Math.max(0.1, p.ppg));
    const total = weights.reduce((a, b) => a+b, 0);
    if (!total) continue;
    let r = Math.random() * total, cum = 0;
    for (let i = 0; i < weights.length; i++) {
      cum += weights[i];
      if (cum >= r) { trial[s] = i; break; }
    }
  }
  return { indices: trial, type: nSwaps + '-swap' };
}

function describeSwap(baseIdx, newIdx) {
  const parts = [];
  for (let s = 0; s < 8; s++) {
    if (newIdx[s] !== baseIdx[s]) {
      const ps = CUR.pool_by_seed[s+1] || CUR.pool_by_seed[String(s+1)] || [];
      parts.push(`Sd${s+1}: ${ps[baseIdx[s]]?.name || '?'} → ${ps[newIdx[s]]?.name || '?'}`);
    }
  }
  return parts.join(' | ');
}

async function runConfirmation(picks) {
  return new Promise(resolve => {
    let totalEV = 0, totalPts = 0, done = 0;
    function batch() {
      if (!running) return resolve(null);
      const r = simBatch(picks, CONFIRM_BATCH, Date.now() + done);
      totalEV += r.ev * CONFIRM_BATCH;
      totalPts += r.pts * CONFIRM_BATCH;
      done += CONFIRM_BATCH;
      if (done >= CONFIRM_N) resolve({ ev: totalEV / done, pts: totalPts / done });
      else setTimeout(batch, 0);
    }
    batch();
  });
}

async function exhaustiveSweep() {
  if (!running) { alert('Press Start first'); return; }
  log('SWEEP: testing every player at every seed', 'log-test');
  document.getElementById('candBadge').textContent = 'SWEEP';
  for (let s = 0; s < 8 && running; s++) {
    const ps = CUR.pool_by_seed[s+1] || CUR.pool_by_seed[String(s+1)] || [];
    for (let pi = 0; pi < ps.length && running; pi++) {
      if (pi === bestIndices[s]) continue;
      const trial = [...bestIndices]; trial[s] = pi;
      const team = resolveTeam(trial);
      if (!rosterValid(team)) continue;
      totalTested++; updateCounters();
      const screen = simBatch(team, SCREEN_N, Date.now()+totalTested);
      candHistory.push(screen.ev);
      if (candHistory.length > 50) candHistory.shift();
      drawCandChart();
      const desc = describeSwap(bestIndices, trial);
      document.getElementById('candSwaps').textContent = `sweep Sd${s+1}: ${desc}`;
      document.getElementById('candStats').innerHTML =
        `<div class="stat"><div class="sv" style="color:${screen.ev>(bestEV||0)?'#22c55e':'#94a3b8'}">$${screen.ev.toFixed(1)}</div><div class="sl">Sweep ${totalTested}</div></div>`;
      if (screen.ev > (bestEV || 0) * 1.02) {  // 2% buffer to filter noise
        document.getElementById('candBadge').textContent = 'CONFIRMING';
        const result = await runConfirmation(team);
        if (result && result.ev > (bestEV || 0)) {
          totalAdopted++; updateCounters();
          const oldEV = bestEV;
          bestIndices = [...trial]; bestEV = result.ev; bestPts = result.pts;
          bestEVHistory.push({time: Date.now(), ev: bestEV, lineup: getLineupSnapshot(bestIndices), swapDesc: 'sweep: ' + desc});
          drawHistoryChart(); renderBestTeam(); saveState();
          log(`SWEEP $${(oldEV||0).toFixed(1)} → $${result.ev.toFixed(1)} | ${desc}`, 'log-adopt');
          s = -1; break;
        } else {
          totalFailed++; updateCounters();
          log(`SWEEP failed confirm: $${result?.ev?.toFixed(1) || '?'} | ${desc}`, 'log-fail');
        }
        document.getElementById('candBadge').textContent = 'SWEEP';
      }
      await new Promise(r => setTimeout(r, 5));
    }
  }
  log('SWEEP complete', 'log-test');
}

async function optimizerLoop() {
  // Initial calibration
  if (bestEV == null) {
    log('Calibrating initial best EV...', 'log-test');
    const init = await runConfirmation(resolveTeam(bestIndices));
    if (!init) return;
    bestEV = init.ev; bestPts = init.pts;
    bestEVHistory.push({time: Date.now(), ev: bestEV, lineup: getLineupSnapshot(bestIndices), swapDesc: 'initial'});
    renderBestTeam(); saveState(); drawHistoryChart();
    log(`Initial EV: $${bestEV.toFixed(1)}`, 'log-test');
  }
  if (refEV == null) {
    const refResult = await runConfirmation(resolveTeam(refIndices));
    if (refResult) { refEV = refResult.ev; renderBestTeam(); saveState(); }
  }
  while (running) {
    const cand = genCandidate();
    const team = resolveTeam(cand.indices);
    if (!rosterValid(team)) { totalFailed++; updateCounters(); continue; }
    totalTested++; updateCounters();
    const screen = simBatch(team, SCREEN_N, Date.now() + totalTested);
    candHistory.push(screen.ev);
    if (candHistory.length > 50) candHistory.shift();
    drawCandChart();
    const desc = describeSwap(bestIndices, cand.indices);
    document.getElementById('candSwaps').textContent = `${cand.type}: ${desc}`;
    document.getElementById('candStats').innerHTML =
      `<div class="stat"><div class="sv" style="color:${screen.ev>(bestEV||0)?'#22c55e':'#94a3b8'}">$${screen.ev.toFixed(1)}</div><div class="sl">Screen</div></div>`;
    if (screen.ev > bestEV * 1.02) {
      document.getElementById('candBadge').textContent = 'CONFIRMING';
      document.getElementById('candidatePanel').style.borderColor = '#c8102e';
      const result = await runConfirmation(team);
      if (result && result.ev > bestEV) {
        totalAdopted++; updateCounters();
        const oldEV = bestEV;
        bestIndices = [...cand.indices]; bestEV = result.ev; bestPts = result.pts;
        bestEVHistory.push({time: Date.now(), ev: bestEV, lineup: getLineupSnapshot(bestIndices), swapDesc: desc});
        drawHistoryChart(); renderBestTeam(); saveState();
        log(`ADOPTED $${oldEV.toFixed(1)} → $${result.ev.toFixed(1)} | ${desc}`, 'log-adopt');
      } else {
        totalFailed++; updateCounters();
        log(`failed confirm: $${result?.ev?.toFixed(1) || '?'}`, 'log-fail');
      }
      document.getElementById('candBadge').textContent = 'SCREENING';
      document.getElementById('candidatePanel').style.borderColor = '#1e3a5f';
    }
    await new Promise(r => setTimeout(r, 5));
  }
}

function toggleRun() {
  running = !running;
  const btn = document.getElementById('runBtn');
  if (running) {
    btn.textContent = '⏸ Pause'; btn.className = 'btn btn-pause';
    optimizerLoop();
  } else {
    btn.textContent = '▶ Start'; btn.className = 'btn btn-start';
  }
}

// === INIT ===
loadState();
renderBestTeam();
updateCounters();
drawHistoryChart();
log('Loaded ' + currentYear + ' · ' + CUR.opponents.length + ' opponents · '
    + Object.values(CUR.pool_by_seed).reduce((a,b)=>a+b.length,0) + ' players', 'log-test');
