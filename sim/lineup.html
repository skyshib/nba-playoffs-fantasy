<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>NBA Manual Lineup Sim</title>
<style>
body{background:#0a1628;color:#f1f5f9;font-family:ui-monospace,SFMono-Regular,monospace;padding:1rem;margin:0}
h1{color:#c8102e;margin:0 0 .3rem;font-size:1.3rem}
a{color:#3b82f6;text-decoration:none}
a:hover{text-decoration:underline}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem}
.panel{background:#121f36;border:1px solid #1e3a5f;border-radius:6px;padding:.75rem;margin-bottom:.8rem;max-width:1100px}
table{border-collapse:collapse;font-size:.78rem;width:100%}
th{background:#1e3a5f;color:#94a3b8;padding:.4rem .5rem;text-align:left;font-size:.65rem;text-transform:uppercase}
td{padding:.35rem .5rem;border-bottom:1px solid rgba(255,255,255,.04)}
select{background:#0a1628;color:#f1f5f9;border:1px solid #1e3a5f;border-radius:4px;padding:.3rem;font-family:inherit;font-size:.75rem;width:100%}
.stat{display:inline-block;background:#0a1628;border:1px solid #1e3a5f;border-radius:6px;padding:.5rem .75rem;text-align:center;margin:.2rem}
.sv{font-size:1.2rem;font-weight:900}.sv.o{color:#c8102e}.sv.g{color:#22c55e}.sv.b{color:#3b82f6}.sv.r{color:#ef4444}
.sl{font-size:.55rem;color:#64748b;text-transform:uppercase}
.btn{padding:.5rem 1rem;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-size:.8rem;font-family:inherit;background:#22c55e;color:#000;margin-right:.5rem}
.btn:hover{background:#4ade80}
.btn.secondary{background:#3b82f6;color:#fff}
.over-budget{color:#ef4444}
.year-select{background:#1e3a5f;color:#f1f5f9;border:1px solid #3b82f6;border-radius:4px;padding:.3rem .5rem;font-size:.75rem;font-weight:700;cursor:pointer;width:auto}
.histo{font-size:.7rem;color:#94a3b8;margin-top:.5rem}
.histo .bar{display:inline-block;width:8px;background:#22c55e;margin-right:1px;vertical-align:bottom}
</style>
</head><body>
<div class="top-bar">
  <h1>NBA Playoffs Fantasy — Manual Lineup</h1>
  <div style="display:flex;align-items:center;gap:1rem">
    <select id="yearSelect" class="year-select" onchange="switchYear(this.value)"></select>
    <a href="index.html">Live Optimizer</a>
    <a href="../index.html">← Scoreboard</a>
  </div>
</div>

<div class="panel">
  <div style="font-size:.7rem;color:#64748b;margin-bottom:.5rem">
    Pick 8 players (one per seed). Click <strong>Simulate</strong> to estimate score distribution
    using bracket Monte Carlo + per-game scoring variance.
  </div>
  <table id="rosterTable"><thead><tr><th>Sd</th><th>Mult</th><th>Player</th><th>Team</th><th>PPG</th><th>Eff. cost</th></tr></thead>
  <tbody id="rosterBody"></tbody>
  <tfoot id="rosterFoot"></tfoot></table>

  <div style="margin-top:.75rem">
    <button class="btn" onclick="simulate()">Simulate (10 000 sims)</button>
    <button class="btn secondary" onclick="loadEntrant()">Load entrant…</button>
    <span id="status" style="margin-left:1rem;color:#64748b;font-size:.75rem"></span>
  </div>
</div>

<div class="panel" id="resultPanel" style="display:none">
  <h3 style="margin:0 0 .5rem;font-size:.95rem;color:#22c55e">Simulation results</h3>
  <div id="resultStats"></div>
  <div id="resultHist" class="histo"></div>
</div>

<script src="allyears.js"></script>
<script>
const BUDGET = 115.6, FLOOR = BUDGET / 16;
const MULTIPLIER_START_YEAR = 2025;
const SERIES_LEN_DIST = {4: 0.15, 5: 0.30, 6: 0.30, 7: 0.25};

let currentYear = '2026';
let CUR = ALL_YEARS_DATA[currentYear];
const selected = {};  // seed -> player_id

(function init() {
  const sel = document.getElementById('yearSelect');
  for (const y of Object.keys(ALL_YEARS_DATA).sort((a,b)=>b-a)) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === currentYear) o.selected = true;
    sel.appendChild(o);
  }
})();

function multFor(seed) { return parseInt(currentYear, 10) >= MULTIPLIER_START_YEAR ? (1 + seed/10) : 1; }
function effCost(p) { return Math.max(p, FLOOR); }

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function gauss(rng){let u,v,s;do{u=rng()*2-1;v=rng()*2-1;s=u*u+v*v}while(s>=1||s===0);return u*Math.sqrt(-2*Math.log(s)/s);}
function wp(a,b){return a===b?0.5:1/(1+Math.pow(10,(a-b)*0.08));}
function sampleSL(rng){const r=rng();let c=0;for(const [l,p] of Object.entries(SERIES_LEN_DIST)){c+=p;if(r<c)return parseInt(l);}return 7;}

function simBracket(rng) {
  const bySeed = {};
  for (const t of CUR.bracket) (bySeed[t.seed] ||= []).push(t);
  const confA = [], confB = [];
  for (let s = 1; s <= 8; s++) {
    const arr = (bySeed[s] || []).slice();
    if (arr[0]) confA.push(arr[0]);
    if (arr[1]) confB.push(arr[1]);
  }
  const games = {};
  function init(t) { games[t.team_name] = {R1:0, CSF:0, CF:0, Finals:0}; }
  confA.forEach(init); confB.forEach(init);
  function play(t1, t2, rd) {
    if (!t1 || !t2) return t1 || t2;
    const len = sampleSL(rng);
    games[t1.team_name][rd] = len; games[t2.team_name][rd] = len;
    return rng() < wp(t1.seed, t2.seed) ? t1 : t2;
  }
  function runConf(c) {
    const bs = {}; c.forEach(t => bs[t.seed] = t);
    const r1 = [play(bs[1], bs[8], 'R1'), play(bs[4], bs[5], 'R1'), play(bs[3], bs[6], 'R1'), play(bs[2], bs[7], 'R1')];
    const csf = [play(r1[0], r1[1], 'CSF'), play(r1[2], r1[3], 'CSF')];
    return play(csf[0], csf[1], 'CF');
  }
  const champA = runConf(confA), champB = runConf(confB);
  if (champA && champB) play(champA, champB, 'Finals');
  return games;
}

function simRoster(picks, rng, games) {
  let total = 0;
  for (const p of picks) {
    const tg = games[p.team]; if (!tg) continue;
    const sd = p.ppg * 0.4, m = multFor(p.seed);
    for (const rd of ['R1','CSF','CF','Finals']) {
      const ng = tg[rd] || 0; if (!ng) continue;
      const samples = [];
      for (let i = 0; i < ng; i++) samples.push(Math.max(0, p.ppg + gauss(rng) * sd));
      samples.sort((a,b)=>b-a);
      const top = samples.slice(0, 4);
      total += (top.reduce((a,b)=>a+b,0) / top.length) * m;
    }
  }
  return total;
}

function getRoster() {
  const r = [];
  for (let s = 1; s <= 8; s++) {
    const pid = selected[s];
    const ps = CUR.pool_by_seed[s] || CUR.pool_by_seed[String(s)] || [];
    const p = ps.find(x => x.slug === pid);
    if (p) r.push({...p, seed: s});
  }
  return r;
}

function renderTable() {
  const tbody = document.getElementById('rosterBody');
  let html = '';
  for (let s = 1; s <= 8; s++) {
    const ps = CUR.pool_by_seed[s] || CUR.pool_by_seed[String(s)] || [];
    const sel = selected[s] || '';
    let opts = `<option value="">— pick ${s}-seed —</option>`;
    for (const p of ps) opts += `<option value="${p.slug}" ${sel === p.slug ? 'selected' : ''}>${p.name} — ${p.team} (${p.ppg})</option>`;
    const chosen = ps.find(x => x.slug === sel);
    const ppg = chosen ? chosen.ppg : '—';
    const eff = chosen ? effCost(chosen.ppg).toFixed(2) : '—';
    const team = chosen ? chosen.team : '—';
    html += `<tr><td><strong>${s}</strong></td><td style="color:#64748b">${multFor(s).toFixed(1)}×</td><td><select onchange="pickFor(${s}, this.value)">${opts}</select></td><td>${team}</td><td>${ppg}</td><td>${eff}</td></tr>`;
  }
  tbody.innerHTML = html;
  const r = getRoster();
  const totalCost = r.reduce((a, p) => a + effCost(p.ppg), 0);
  const cls = totalCost > BUDGET ? 'over-budget' : '';
  document.getElementById('rosterFoot').innerHTML =
    `<tr style="font-weight:700"><td colspan="5" style="text-align:right">Total cost</td><td class="${cls}">${totalCost.toFixed(2)} / ${BUDGET}</td></tr>`;
}

function pickFor(seed, slug) {
  if (slug) selected[seed] = slug;
  else delete selected[seed];
  renderTable();
}

function switchYear(y) {
  currentYear = y; CUR = ALL_YEARS_DATA[y];
  for (const k in selected) delete selected[k];
  renderTable();
  document.getElementById('resultPanel').style.display = 'none';
}

function loadEntrant() {
  if (!CUR.opponents.length) { alert('No entrants for ' + currentYear); return; }
  const names = CUR.opponents.map((e, i) => `${i+1}. ${e.name}`).join('\n');
  const which = prompt('Which entrant? (number)\n' + names);
  const idx = parseInt(which) - 1;
  if (isNaN(idx) || idx < 0 || idx >= CUR.opponents.length) return;
  const ent = CUR.opponents[idx];
  for (const k in selected) delete selected[k];
  for (const p of ent.players) {
    if (p.slug && p.seed) selected[p.seed] = p.slug;
  }
  renderTable();
}

async function simulate() {
  const r = getRoster();
  if (r.length < 8) { alert('Pick all 8 seeds first'); return; }
  const totalCost = r.reduce((a, p) => a + effCost(p.ppg), 0);
  if (totalCost > BUDGET + 0.01) {
    if (!confirm(`Over budget ($${totalCost.toFixed(2)} > $${BUDGET}). Simulate anyway?`)) return;
  }
  document.getElementById('status').textContent = 'Running 10 000 sims...';
  await new Promise(rr => setTimeout(rr, 30));
  const N = 10000;
  const rng = mulberry32(Date.now());
  const scores = [];
  for (let i = 0; i < N; i++) {
    const games = simBracket(rng);
    scores.push(simRoster(r, rng, games));
  }
  scores.sort((a, b) => a - b);
  const mean = scores.reduce((a,b)=>a+b, 0) / N;
  const sd = Math.sqrt(scores.reduce((a,b)=>a+(b-mean)*(b-mean),0)/N);
  const pct = p => scores[Math.floor(p * (N-1))];

  // Compare against opponents
  let beats = 0;
  if (CUR.opponents.length) {
    for (let i = 0; i < N; i++) {
      const games = simBracket(rng);
      const my = simRoster(r, rng, games);
      let allHigher = true;
      for (const opp of CUR.opponents) {
        if (!opp.players || opp.players.length < 8) continue;
        const oppScore = simRoster(opp.players, rng, games);
        if (oppScore >= my) { allHigher = false; break; }
      }
      if (allHigher) beats++;
    }
  }

  const winRate = CUR.opponents.length ? (beats / N * 100).toFixed(1) : '—';
  document.getElementById('resultStats').innerHTML =
    `<div class="stat"><div class="sv g">${mean.toFixed(1)}</div><div class="sl">Mean</div></div>` +
    `<div class="stat"><div class="sv b">±${sd.toFixed(1)}</div><div class="sl">Std dev</div></div>` +
    `<div class="stat"><div class="sv">${pct(0.05).toFixed(1)}</div><div class="sl">P5</div></div>` +
    `<div class="stat"><div class="sv">${pct(0.50).toFixed(1)}</div><div class="sl">Median</div></div>` +
    `<div class="stat"><div class="sv">${pct(0.95).toFixed(1)}</div><div class="sl">P95</div></div>` +
    `<div class="stat"><div class="sv o">${winRate}%</div><div class="sl">P(win) vs entrants</div></div>`;

  // Histogram
  const buckets = 30, lo = scores[0], hi = scores[N-1];
  const w = (hi - lo) / buckets;
  const hist = new Array(buckets).fill(0);
  for (const s of scores) hist[Math.min(buckets-1, Math.floor((s-lo)/w))]++;
  const max = Math.max(...hist);
  let html = `<div style="margin-bottom:.3rem">Distribution (${buckets} buckets, ${lo.toFixed(0)}–${hi.toFixed(0)})</div>`;
  html += '<div style="display:flex;align-items:flex-end;gap:1px;height:80px">';
  for (const c of hist) html += `<span class="bar" style="height:${(c/max)*100}%"></span>`;
  html += '</div>';
  document.getElementById('resultHist').innerHTML = html;

  document.getElementById('status').textContent = `done (${N} sims)`;
  document.getElementById('resultPanel').style.display = 'block';
}

renderTable();
</script>
</body></html>
