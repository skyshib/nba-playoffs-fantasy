<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Pool — NBA Playoffs Fantasy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    .players-main { max-width: 1600px; margin: 1rem auto; padding: 0 1rem; }

    .pp-roster {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    .pp-roster-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    .pp-budget-bar {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-variant-numeric: tabular-nums;
      font-size: 0.9rem;
    }
    .pp-budget-bar .pp-budget-val { font-weight: 700; color: var(--accent-gold); font-size: 1.05rem; }
    .pp-budget-bar .pp-budget-cap { color: var(--text-muted); }
    .pp-budget-bar.over .pp-budget-val { color: var(--over-budget); }
    .pp-roster-count {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pp-roster-actions { display: flex; gap: 0.4rem; }
    .pp-roster-btn {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      padding: 0.3rem 0.6rem;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: inherit;
    }
    .pp-roster-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .pp-roster-btn.primary { background: var(--accent-red); color: #fff; border-color: var(--accent-red); font-weight: 700; }
    .pp-roster-btn.primary:hover { filter: brightness(1.1); }
    .pp-roster-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .pp-dirty-note {
      margin-left: 0.5rem;
      font-size: 0.65rem;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-style: italic;
    }

    .pp-slots {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 0.3rem;
    }
    .pp-slot {
      background: var(--bg-primary);
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.4rem;
      min-height: 46px;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      font-size: 0.7rem;
      cursor: default;
      position: relative;
    }
    .pp-slot.filled {
      border-style: solid;
      border-color: var(--accent-red);
      background: rgba(200, 16, 46, 0.08);
    }
    .pp-slot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pp-slot-header .pp-slot-mult { color: var(--accent-gold); font-weight: 700; }
    .pp-slot-body {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      min-height: 22px;
    }
    .pp-slot-face {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .pp-slot-face img { width: 100%; height: 100%; object-fit: cover; }
    .pp-slot-name {
      flex: 1;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pp-slot-cost { color: var(--accent-gold); font-variant-numeric: tabular-nums; font-size: 0.7rem; font-weight: 700; }
    .pp-slot-empty { color: var(--text-muted); font-style: italic; font-size: 0.7rem; }
    .pp-slot-clear {
      position: absolute;
      top: 2px;
      right: 4px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      line-height: 1;
      padding: 0 0.2rem;
    }
    .pp-slot-clear:hover { color: var(--over-budget); }

    /* Dot selected indicator */
    .pp-dot.selected {
      border-color: var(--accent-gold) !important;
      box-shadow: 0 0 0 2px var(--accent-gold), 0 0 8px rgba(251, 191, 36, 0.5) !important;
    }
    .pp-dot.selected::after {
      content: '✓';
      position: absolute;
      bottom: -6px;
      right: -6px;
      background: var(--accent-gold);
      color: #000;
      font-size: 0.6rem;
      font-weight: 900;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--bg-secondary);
    }
    .pp-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
    }
    .pp-controls input {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      font-family: inherit;
      font-size: 0.85rem;
      min-width: 180px;
    }
    .pp-legend { color: var(--text-muted); font-size: 0.75rem; }

    .pp-chart {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      position: relative;
      overflow-x: auto;
    }
    .pp-inner {
      position: relative;
      min-width: 1100px;
    }

    .pp-row {
      display: grid;
      grid-template-columns: 110px 36px 1fr;
      align-items: center;
      height: 52px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      position: relative;
    }
    .pp-row.gap { height: 16px; border-bottom: none; background: rgba(255,255,255,0.015); }
    .pp-row-team {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding-right: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pp-row-logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .pp-row-seed {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 700;
    }
    .pp-row-plot {
      position: relative;
      height: 100%;
      border-left: 1px solid var(--border);
    }
    .pp-section-label {
      position: absolute;
      left: 0.5rem;
      top: 0.1rem;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--accent-gold);
      text-transform: uppercase;
      font-weight: 700;
      background: var(--bg-secondary);
      padding: 0 0.4rem;
      z-index: 2;
    }

    .pp-axis {
      display: grid;
      grid-template-columns: 110px 36px 1fr;
      margin-top: 0.5rem;
      color: var(--text-muted);
      font-size: 0.65rem;
    }
    .pp-axis-plot {
      position: relative;
      height: 24px;
      border-top: 1px solid var(--border);
    }
    .pp-tick {
      position: absolute;
      transform: translateX(-50%);
      top: 4px;
      color: var(--text-muted);
    }
    .pp-axis-label {
      text-align: center;
      margin-top: 0.25rem;
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pp-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--bg-row);
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.6);
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      z-index: 1;
      pointer-events: none;  /* hover driven by row-level JS */
    }
    .pp-dot.hovered {
      transform: translate(-50%, -50%) scale(1.9);
      border-color: var(--accent-red);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.7);
      z-index: 50;
    }
    .pp-row-plot.has-hover .pp-dot:not(.hovered) { opacity: 0.55; }
    .pp-row-plot { cursor: pointer; }
    .pp-dot.dim { opacity: 0.18; filter: grayscale(100%); }
    .pp-dot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pp-dot-fallback {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--text-secondary);
      font-weight: 700;
      background: var(--bg-hover);
    }

    .pp-floor-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      border-left: 1px dashed rgba(255, 255, 255, 0.25);
      z-index: 0;
      pointer-events: none;
    }
    .pp-floor-label {
      position: absolute;
      top: -0.1rem;
      transform: translateX(-50%);
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      background: var(--bg-secondary);
      padding: 0 0.3rem;
      white-space: nowrap;
      z-index: 1;
      pointer-events: none;
    }

    .pp-tooltip {
      position: fixed;
      z-index: 1000;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.75rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      min-width: 180px;
      font-size: 0.78rem;
    }
    .pp-tooltip.visible { opacity: 1; }
    .pp-tip-name { font-weight: 700; font-size: 0.9rem; color: var(--text-primary); }
    .pp-tip-team { color: var(--text-muted); font-size: 0.72rem; margin-bottom: 0.3rem; }
    .pp-tip-stat { display: flex; justify-content: space-between; padding: 0.1rem 0; }
    .pp-tip-label { color: var(--text-muted); }
    .pp-tip-value { color: var(--accent-red); font-weight: 700; font-variant-numeric: tabular-nums; }
    .pp-tip-badge {
      display: inline-block;
      font-size: 0.6rem; font-weight: 700;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      background: var(--accent-gold); color: #000;
      margin-left: 0.3rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a class="logo" href="index.html" style="text-decoration:none;color:inherit">
        <span class="logo-icon">🏀</span>
        <h1>NBA Playoffs Fantasy — Player Pool</h1>
      </a>
      <div class="controls">
        <span id="countdown" class="countdown" title="Time until picks lock"></span>
        <a class="view-toggle" href="index.html">Scoreboard</a>
        <a class="view-toggle active" href="players.html">Player Pool</a>
        <a class="view-toggle" href="rules.html">Rules</a>
        <a class="view-toggle" href="index.html#bug">Report Bug</a>
        <a class="view-toggle primary" href="index.html#picks">Enter Picks</a>
      </div>
    </div>
  </header>

  <main class="players-main">
    <!-- Sticky roster-builder bar -->
    <div class="pp-roster" id="pp-roster">
      <div class="pp-roster-top">
        <div class="pp-budget-bar" id="pp-budget-bar">
          <span class="pp-budget-val" id="pp-spent">$0.00</span>
          <span class="pp-budget-cap">/ <span id="pp-cap">$115.61</span> budget</span>
          <span class="pp-roster-count" id="pp-roster-count" style="margin-left:.6rem">0 / 8 picks</span>
          <span class="pp-dirty-note" id="pp-dirty-note" style="display:none">· unsaved changes</span>
        </div>
        <div class="pp-roster-actions">
          <button class="pp-roster-btn" id="pp-clear-roster">Clear</button>
          <button class="pp-roster-btn primary" id="pp-use-roster">Use This Roster →</button>
        </div>
      </div>
      <div class="pp-slots" id="pp-slots"></div>
    </div>

    <div class="pp-controls">
      <input id="pp-search" type="search" placeholder="Filter by player or team…">
      <span class="pp-legend">Click a face to add. Click again to remove. Picks save automatically.</span>
      <span id="pp-count" class="pp-legend" style="margin-left:auto"></span>
    </div>

    <div class="pp-chart">
      <div class="pp-inner" id="pp-inner">Loading…</div>
    </div>
  </main>

  <div id="pp-tooltip" class="pp-tooltip"></div>

  <script src="js/countdown.js?v=1"></script>
  <script>
  (async function() {
    // Conference assignment — ESPN doesn't give us conference on budget.json,
    // so we hard-code for the 16 NBA teams. Add any new team here.
    const EAST_TEAMS = new Set([
      'Atlanta Hawks', 'Boston Celtics', 'Brooklyn Nets', 'Charlotte Hornets',
      'Chicago Bulls', 'Cleveland Cavaliers', 'Detroit Pistons', 'Indiana Pacers',
      'Miami Heat', 'Milwaukee Bucks', 'New York Knicks', 'Orlando Magic',
      'Philadelphia 76ers', 'Toronto Raptors', 'Washington Wizards'
    ]);

    const [budget, headshots, teamLogos] = await Promise.all([
      fetch('data/budget.json?t=' + Date.now()).then(r => r.json()),
      fetch('data/headshots.json?t=' + Date.now()).then(r => r.json()).catch(() => ({})),
      fetch('data/team_logos.json?t=' + Date.now()).then(r => r.json()).catch(() => ({})),
    ]);

    const players = budget.players || [];
    const maxPPG = Math.max(...players.map(p => p.cost || 0), 35);
    // Round up to nearest 5
    const xMax = Math.ceil(maxPPG / 5) * 5;
    // Budget floor (minimum cost per pick): budget / 16
    const floor = (budget.league_ppg || 115.61) / 16;
    const floorPct = (floor / xMax) * 100;

    // Group players: conference → seed → [players]
    const bucket = {East: {}, West: {}};
    for (const p of players) {
      const conf = EAST_TEAMS.has(p.team) ? 'East' : 'West';
      if (!bucket[conf][p.seed]) bucket[conf][p.seed] = {team: p.team, players: []};
      // In case two teams share a seed slot in our data (shouldn't happen post-play-in)
      if (bucket[conf][p.seed].team !== p.team) {
        // Keep the first seen; future work if multi-team-per-seed
      }
      bucket[conf][p.seed].players.push(p);
    }

    function row(conf, seed, info, isFirstOfConf, isFirstRow) {
      const logoUrl = teamLogos[info.team] || '';
      const label = isFirstOfConf ? `<div class="pp-section-label">${conf}</div>` : '';
      const floorLabel = isFirstRow
        ? `<div class="pp-floor-label" style="left:${floorPct}%">min $${floor.toFixed(2)}</div>`
        : '';
      const floorLine = `<div class="pp-floor-line" style="left:${floorPct}%"></div>`;
      let html = `<div class="pp-row" data-conf="${conf}" data-seed="${seed}" data-team="${info.team}">`;
      html += `<div class="pp-row-team">${logoUrl ? `<img class="pp-row-logo" src="${logoUrl}" onerror="this.style.display='none'">` : ''}<span>${info.team.replace(/\\bGolden State\\b/, 'GS').replace(/\\bOklahoma City\\b/, 'OKC').replace(/\\bLos Angeles\\b/, 'LA').replace(/\\bSan Antonio\\b/, 'SA').replace(/\\bNew Orleans\\b/, 'NO').replace(/\\bNew York\\b/, 'NY')}</span></div>`;
      html += `<div class="pp-row-seed">Sd ${seed}</div>`;
      html += `<div class="pp-row-plot">${label}${floorLine}${floorLabel}`;

      // Sort by PPG ascending. Detect clusters (players within CLUSTER_GAP of
      // each other) and stagger their *displayed* X position symmetrically
      // around the cluster centroid so faces don't overlap. True PPG is
      // preserved for tooltip + hover-value.
      const sorted = info.players.slice().sort((a, b) => a.cost - b.cost);
      const CLUSTER_GAP = xMax * 0.008;  // min PPG gap to treat dots as separated
      const STAGGER = xMax * 0.0085;     // spread between staggered cluster members

      let clusterStart = 0;
      function applyStagger(lo, hi) {
        const n = hi - lo + 1;
        if (n <= 1) { sorted[lo]._displayPPG = sorted[lo].cost; return; }
        const centroid = sorted.slice(lo, hi + 1).reduce((a, p) => a + p.cost, 0) / n;
        for (let i = lo; i <= hi; i++) {
          const offset = (i - lo - (n - 1) / 2) * STAGGER;
          sorted[i]._displayPPG = Math.max(0, Math.min(xMax, centroid + offset));
        }
      }
      for (let i = 0; i < sorted.length; i++) {
        if (i > 0 && sorted[i].cost - sorted[i - 1].cost > CLUSTER_GAP) {
          applyStagger(clusterStart, i - 1);
          clusterStart = i;
        }
      }
      if (sorted.length) applyStagger(clusterStart, sorted.length - 1);

      for (const p of sorted) {
        const xPct = Math.min(100, (p._displayPPG / xMax) * 100);
        const hs = headshots[p.player_id] || '';
        const initials = p.name.split(' ').filter(Boolean).slice(0,2).map(w => w[0]).join('');
        const face = hs
          ? `<img src="${hs}" onerror="this.style.display='none';this.parentNode.classList.add('no-hs')">`
          : `<span class="pp-dot-fallback">${initials}</span>`;
        html += `<div class="pp-dot" style="left:${xPct}%" data-slug="${p.player_id}" data-name="${p.name.replace(/"/g,'&quot;')}" data-team="${p.team}" data-seed="${seed}" data-conf="${conf}" data-ppg="${p.cost}" data-overridden="${p.cost_overridden ? '1' : ''}">${face}</div>`;
      }
      html += `</div></div>`;
      return html;
    }

    let html = '';
    let firstRow = true;
    // Group by seed: seed 1 East + West, gap, seed 2 East + West, gap, ...
    for (let s = 1; s <= 8; s++) {
      for (const conf of ['East', 'West']) {
        const info = bucket[conf][s];
        if (!info) continue;
        html += row(conf, s, info, false, firstRow);
        firstRow = false;
      }
      if (s < 8) html += `<div class="pp-row gap"></div>`;
    }

    // X-axis
    html += `<div class="pp-axis"><div></div><div></div><div class="pp-axis-plot">`;
    for (let x = 0; x <= xMax; x += 5) {
      const pct = (x / xMax) * 100;
      html += `<div class="pp-tick" style="left:${pct}%">${x}</div>`;
    }
    html += `</div></div>`;
    html += `<div class="pp-axis-label">Regular-season PPG (cost)</div>`;

    document.getElementById('pp-inner').innerHTML = html;
    document.getElementById('pp-count').textContent = `${players.length} players`;

    // ---------- Roster selection (tentative, shared with picks UI via localStorage) ----------
    const BUDGET = budget.league_ppg || 115.61;
    const FLOOR = BUDGET / 16;
    const STORE_KEY = 'nbaFantasyPicks';

    document.getElementById('pp-cap').textContent = `$${BUDGET.toFixed(2)}`;

    // Quick lookup by slug
    const bySlug = {};
    for (const p of players) bySlug[p.player_id] = p;

    function effCost(c) { return Math.max(c, FLOOR); }

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
      catch(e) { return {}; }
    }
    function saveState(st) {
      localStorage.setItem(STORE_KEY, JSON.stringify(st));
    }

    // `selected` = the tentative (in-memory) roster you build on this page.
    // Only committed via the "Use This Roster" button, which writes to the
    // localStorage key Enter Picks reads from.
    let selected = {};
    // Initialize from the most-recently-committed roster so users can tweak.
    const committedInitial = (loadState().picks) || {};
    for (const k in committedInitial) selected[k] = committedInitial[k];

    function committedPicksSnapshot() {
      return JSON.stringify((loadState().picks) || {});
    }
    function isDirty() {
      return JSON.stringify(selected) !== committedPicksSnapshot();
    }

    function commit() {
      const st = loadState();
      st.picks = selected;
      saveState(st);
      renderRoster();  // refreshes dirty indicator
    }

    function renderRoster() {
      const slotsEl = document.getElementById('pp-slots');
      let slotsHtml = '';
      let spent = 0;
      let filled = 0;
      for (let s = 1; s <= 8; s++) {
        const slug = selected[s];
        const p = slug ? bySlug[slug] : null;
        const mult = (1 + s/10).toFixed(1) + '×';
        if (p) {
          const cost = effCost(p.cost);
          spent += cost;
          filled++;
          const hs = headshots[p.player_id] || '';
          slotsHtml += `<div class="pp-slot filled" data-seed="${s}">
            <button class="pp-slot-clear" title="Remove" data-clear="${s}">×</button>
            <div class="pp-slot-header"><span>Sd ${s}</span><span class="pp-slot-mult">${mult}</span></div>
            <div class="pp-slot-body">
              ${hs ? `<span class="pp-slot-face"><img src="${hs}"></span>` : ''}
              <span class="pp-slot-name" title="${p.name} · ${p.team}">${p.name}</span>
              <span class="pp-slot-cost">$${cost.toFixed(2)}</span>
            </div>
          </div>`;
        } else {
          slotsHtml += `<div class="pp-slot" data-seed="${s}">
            <div class="pp-slot-header"><span>Sd ${s}</span><span class="pp-slot-mult">${mult}</span></div>
            <div class="pp-slot-body"><span class="pp-slot-empty">— empty —</span></div>
          </div>`;
        }
      }
      slotsEl.innerHTML = slotsHtml;

      const bar = document.getElementById('pp-budget-bar');
      const over = spent > BUDGET + 1e-9;
      bar.classList.toggle('over', over);
      document.getElementById('pp-spent').textContent = `$${spent.toFixed(2)}`;
      document.getElementById('pp-roster-count').textContent = `${filled} / 8 picks` + (over ? ` · over by $${(spent - BUDGET).toFixed(2)}` : '');

      // Dirty indicator
      const dirty = isDirty();
      document.getElementById('pp-dirty-note').style.display = dirty ? '' : 'none';
      // "Use This Roster" is always enabled — incomplete/over-budget rosters
      // still transfer to the Enter Picks modal where the user can fix them.

      // Wire clear buttons
      slotsEl.querySelectorAll('[data-clear]').forEach(b => {
        b.addEventListener('click', e => {
          e.stopPropagation();
          const s = parseInt(b.dataset.clear);
          delete selected[s];
          renderRoster();
          refreshDotSelection();
        });
      });

      // Clicking a slot scrolls to that seed row (nice affordance)
      slotsEl.querySelectorAll('.pp-slot').forEach(el => {
        el.addEventListener('click', () => {
          const s = el.dataset.seed;
          const slug = selected[s];
          const target = slug
            ? document.querySelector(`.pp-dot[data-slug="${slug}"]`)
            : document.querySelector(`.pp-row[data-seed="${s}"]`);
          target?.scrollIntoView({behavior: 'smooth', block: 'center'});
        });
      });
    }

    function refreshDotSelection() {
      document.querySelectorAll('.pp-dot').forEach(d => {
        const isSelected = Object.values(selected).includes(d.dataset.slug);
        d.classList.toggle('selected', isSelected);
      });
    }

    function toggleSelectionFromDot(dotEl) {
      const slug = dotEl.dataset.slug;
      const seed = parseInt(dotEl.dataset.seed);
      // If this slug is already selected anywhere, deselect.
      const existingSeed = Object.keys(selected).find(k => selected[k] === slug);
      if (existingSeed) {
        delete selected[existingSeed];
      } else {
        selected[seed] = slug;
      }
      renderRoster();
      refreshDotSelection();
    }

    document.getElementById('pp-clear-roster').addEventListener('click', () => {
      if (!confirm('Clear all 8 picks? (This only resets the in-progress roster; your committed picks are unchanged until you press Use This Roster.)')) return;
      selected = {};
      renderRoster();
      refreshDotSelection();
    });

    document.getElementById('pp-use-roster').addEventListener('click', () => {
      commit();
      // Navigate to Enter Picks so the user can add their name + tiebreaker + submit
      location.href = 'index.html#picks';
    });

    // Initial render + hook up dot clicks via row-level listener so it works
    // even when pointer-events is none on dots.
    renderRoster();
    refreshDotSelection();

    // Tooltip + nearest-dot hover detection per row.
    // Rather than relying on CSS :hover (which only fires over a dot's box),
    // we listen on the plot area for mousemove and highlight the dot whose
    // X-position is closest to the cursor. That way clusters remain fully
    // browsable — any lateral nudge picks up the adjacent player.
    const tip = document.getElementById('pp-tooltip');

    function showTooltipFor(el) {
      const d = el.dataset;
      const overBadge = d.overridden === '1' ? '<span class="pp-tip-badge">ADJ</span>' : '';
      tip.innerHTML = `
        <div class="pp-tip-name">${d.name}${overBadge}</div>
        <div class="pp-tip-team">${d.team} · ${d.conf} ${d.seed}-seed</div>
        <div class="pp-tip-stat"><span class="pp-tip-label">PPG (cost)</span><span class="pp-tip-value">${Number(d.ppg).toFixed(1)}</span></div>
        <div class="pp-tip-stat"><span class="pp-tip-label">Seed multiplier</span><span class="pp-tip-value">${(1 + parseInt(d.seed)/10).toFixed(1)}×</span></div>
      `;
      const rect = el.getBoundingClientRect();
      tip.classList.add('visible');
      const tr = tip.getBoundingClientRect();
      let left = rect.left + rect.width/2 - tr.width/2;
      let top  = rect.top - tr.height - 8;
      if (left < 6) left = 6;
      if (left + tr.width > window.innerWidth - 6) left = window.innerWidth - tr.width - 6;
      if (top < 6) top = rect.bottom + 8;
      tip.style.left = left + 'px';
      tip.style.top  = top + 'px';
    }

    function hideTooltip() { tip.classList.remove('visible'); }

    document.querySelectorAll('.pp-row-plot').forEach(plot => {
      const dots = Array.from(plot.querySelectorAll('.pp-dot'));
      if (!dots.length) return;
      let active = null;

      plot.addEventListener('mousemove', e => {
        const rect = plot.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        // Find the dot whose center X is closest to the cursor
        let best = null, bestDist = Infinity;
        for (const d of dots) {
          const dRect = d.getBoundingClientRect();
          const centerX = dRect.left + dRect.width / 2 - rect.left;
          const dist = Math.abs(centerX - mouseX);
          if (dist < bestDist) { bestDist = dist; best = d; }
        }
        if (best && best !== active) {
          if (active) active.classList.remove('hovered');
          best.classList.add('hovered');
          active = best;
          plot.classList.add('has-hover');
          showTooltipFor(best);
        }
      });

      plot.addEventListener('mouseleave', () => {
        if (active) { active.classList.remove('hovered'); active = null; }
        plot.classList.remove('has-hover');
        hideTooltip();
      });

      // Click = toggle selection on currently-nearest dot
      plot.addEventListener('click', e => {
        if (active) toggleSelectionFromDot(active);
      });
    });

    // Filter
    const input = document.getElementById('pp-search');
    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      document.querySelectorAll('.pp-dot').forEach(el => {
        if (!q) { el.classList.remove('dim'); return; }
        const match = el.dataset.name.toLowerCase().includes(q) || el.dataset.team.toLowerCase().includes(q);
        el.classList.toggle('dim', !match);
      });
    });
  })();
  </script>
</body>
</html>
